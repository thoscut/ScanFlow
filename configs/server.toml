[server]
host = "0.0.0.0"
port = 8080
base_url = "http://scanserver.local:8080"

[server.auth]
enabled = true
api_keys = [
    "sk_live_change_me_in_production",
]

[server.tls]
enabled = false
cert_file = "/etc/scanflow/cert.pem"
key_file = "/etc/scanflow/key.pem"

# Automatic TLS via Let's Encrypt / ACME.
# When enabled, certificates are obtained and renewed automatically.
# This takes precedence over manual cert_file/key_file settings.
[server.tls.acme]
enabled = false
email = ""                                    # Contact email for Let's Encrypt
domains = []                                  # e.g. ["scanflow.example.com"]
challenge = "http"                            # "http" or "dns"
cert_dir = "/var/lib/scanflow/certs"
# directory_url = ""                          # Empty = Let's Encrypt production
# dns_provider = ""                           # "cloudflare", "duckdns", "route53", "exec"
# dns_propagation_wait = "120s"               # Wait time for DNS propagation

# Cloudflare DNS settings (when dns_provider = "cloudflare")
# [server.tls.acme.cloudflare]
# api_token_file = "/etc/scanflow/cloudflare_token"
# zone_id = ""                                # Optional, auto-detected if empty

# DuckDNS settings (when dns_provider = "duckdns")
# [server.tls.acme.duckdns]
# token_file = "/etc/scanflow/duckdns_token"

# AWS Route 53 settings (when dns_provider = "route53")
# [server.tls.acme.route53]
# access_key_id = ""
# secret_access_key_file = "/etc/scanflow/route53_secret"
# hosted_zone_id = ""
# region = "us-east-1"

# External script for DNS challenges (when dns_provider = "exec")
# Scripts are called with: <domain> <token> <key_auth>
# [server.tls.acme.exec]
# create_command = "/usr/local/bin/dns-challenge-create"
# cleanup_command = "/usr/local/bin/dns-challenge-cleanup"

[scanner]
device = ""  # Leer = Auto-Detect
auto_open = true

[scanner.defaults]
resolution = 300
mode = "color"
source = "adf_duplex"
page_width = 210.0   # A4
page_height = 297.0  # 0 fuer Ueberlaengen

# Hardware-Button (Kurz/Lang-Druck-Erkennung)
[button]
enabled = true
poll_interval = "50ms"
long_press_duration = "1s"
short_press_profile = "standard"
long_press_profile = "oversize"
output = "paperless"
beep_on_long_press = true

[button.metadata]
title_pattern = "Scan_{date}_{time}"

[processing]
temp_directory = "/tmp/scanflow"
max_concurrent_jobs = 2

[processing.pdf]
format = "PDF/A-2b"
compression = "jpeg"
jpeg_quality = 85

[processing.ocr]
enabled = true
language = "deu+eng"
tesseract_path = "/usr/bin/tesseract"

[storage]
local_directory = "/var/lib/scanflow/documents"
retention_days = 30

[output.paperless]
enabled = true
url = "https://paperless.local"
token_file = "/etc/scanflow/paperless_token"
verify_ssl = true
default_correspondent = 0
default_document_type = 0
default_tags = []

[output.smb]
enabled = false
server = "//nas.local"
share = "scans"
username = "scanner"
password_file = "/etc/scanflow/smb_password"
directory = "incoming"
filename_pattern = "{date}_{time}_{title}"

[output.paperless_consume]
enabled = false
path = "/mnt/paperless/consume"

[output.email]
enabled = false
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_user = "scanner@example.com"
smtp_password_file = "/etc/scanflow/smtp_password"
from_address = "scanner@example.com"
default_recipient = ""

[logging]
level = "info"
format = "json"
file = "/var/log/scanflow/server.log"
